# arbstr core configuration — used by the core service in docker compose
# See https://github.com/johnzilla/arbstr for full config reference

[server]
listen = "0.0.0.0:8080"

[database]
path = "/data/arbstr.db"

# Vault treasury integration
[vault]
url = "http://vault:3000"
internal_token = "${VAULT_INTERNAL_TOKEN}"
default_reserve_tokens = 4096
pending_threshold = 100

